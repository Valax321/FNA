name: Build Libs

on: push

jobs:
  macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup
        run: cd lib
      - name: Update Libs
        run: ./updatelibs.sh
      - name: Build Libs
        run: ./buildlibs.sh macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: bin/macos
