name: Build Libs

on: push

jobs:
  macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Update and Build Libs
        working-directory: ./lib
        run: |
          ./updatelibs.sh
          ./buildlibs.sh macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: lib/bin/macos
